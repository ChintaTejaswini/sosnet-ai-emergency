<body class="bg-surface text-on-surface antialiased overflow-hidden">
<main class="relative h-screen w-full flex flex-col items-center justify-center p-6">
<!-- Background Tonal Stack -->
<div class="absolute inset-0 z-0 flex items-center justify-center">
<div class="w-[80vw] h-[80vw] bg-surface-container-low rounded-full blur-3xl opacity-50"></div>
<div class="absolute top-0 right-0 w-64 h-64 bg-error-container/10 blur-3xl rounded-full"></div>
<div class="absolute bottom-0 left-0 w-96 h-96 bg-primary/5 blur-[120px] rounded-full"></div>
</div>
<!-- Central Identity Cluster -->
<div class="relative z-10 flex flex-col items-center text-center">
<!-- Logo Icon with Emergency Red Accent -->
<div class="relative mb-12 flex items-center justify-center">
<div class="absolute inset-0 bg-primary/10 rounded-full scale-150 blur-2xl"></div>
<div class="emergency-glow w-32 h-32 md:w-40 md:h-40 rounded-full bg-gradient-to-br from-primary to-primary-container flex items-center justify-center shadow-2xl">
<span class="material-symbols-outlined text-white text-6xl md:text-7xl" data-icon="emergency" style="font-variation-settings: 'FILL' 1;">emergency</span>
</div>
</div>
<!-- Brand Typography -->
<div class="space-y-4 max-w-lg">
<h1 class="text-5xl md:text-7xl font-black uppercase tracking-tighter text-on-surface leading-none">
                    SOS<span class="text-primary">Net</span>
</h1>
<div class="flex items-center justify-center gap-3">
<div class="h-[2px] w-8 bg-outline-variant"></div>
<p class="text-sm font-bold uppercase tracking-[0.3em] text-outline">India Edition</p>
<div class="h-[2px] w-8 bg-outline-variant"></div>
</div>
<div class="pt-8">
<p class="text-xl md:text-2xl font-bold text-on-surface-variant leading-tight">
                        Offline AI Emergency Rescue <br class="hidden md:block"/> for India
                    </p>
</div>
</div>
</div>
<!-- Footer Visual Anchors -->
<div class="absolute bottom-16 left-0 w-full flex flex-col items-center gap-8 z-10 px-6">
<!-- Trust Indicators -->
<div class="flex flex-wrap justify-center gap-x-8 gap-y-4 opacity-60">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-xl text-primary" data-icon="shield_with_heart" style="font-variation-settings: 'FILL' 1;">shield_with_heart</span>
<span class="text-xs font-bold uppercase tracking-widest">Always Active</span>
</div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-xl text-primary" data-icon="cloud_off" style="font-variation-settings: 'FILL' 1;">cloud_off</span>
<span class="text-xs font-bold uppercase tracking-widest">No Internet Needed</span>
</div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-xl text-primary" data-icon="location_on" style="font-variation-settings: 'FILL' 1;">location_on</span>
<span class="text-xs font-bold uppercase tracking-widest">Hyper Local</span>
</div>
</div>
<!-- Loading Indicator (Pulse Style) -->
<div class="relative w-full max-w-[200px] h-1 bg-surface-container-highest rounded-full overflow-hidden">
<div class="absolute inset-y-0 left-0 w-1/3 bg-primary rounded-full"></div>
</div>
<p class="text-[10px] font-bold uppercase tracking-[0.2em] text-outline">Securing 1.4 Billion Lives</p>
</div>

<div class="absolute top-12 left-12 hidden lg:block opacity-20">
<p class="text-8xl font-black text-on-surface leading-none select-none tracking-tighter">000</p>
</div>

<p class="text-8xl font-black text-on-surface leading-none select-none tracking-tighter">911</p>
